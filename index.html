<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پست‌بوم | ذخیره در گیت‌هاب</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #f9fafc 0%, #f1f5f9 100%);
            font-family: 'Vazirmatn', 'B Yekan', Tahoma, sans-serif;
            padding: 20px;
            color: #1e293b;
        }
        .container { max-width: 1100px; margin: 0 auto; }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 30px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 15px;
        }
        .logo h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #3b82f6, #a855f7);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .credit {
            background: #ffffffcc;
            backdrop-filter: blur(4px);
            padding: 5px 12px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.85rem;
        }
        .credit i { color: #f43f5e; animation: pulse 1s infinite; display: inline-block; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
        .create-card {
            background: white;
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 15px 30px -12px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        .form-group { margin-bottom: 20px; }
        label { font-weight: 600; display: block; margin-bottom: 6px; }
        textarea {
            width: 100%;
            border: 1.5px solid #e2e8f0;
            border-radius: 24px;
            padding: 12px 16px;
            font-family: inherit;
            font-size: 1rem;
            resize: vertical;
        }
        textarea:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.2); }
        .file-label {
            background: #f1f5f9;
            border-radius: 48px;
            padding: 10px 20px;
            text-align: center;
            cursor: pointer;
            display: inline-block;
            font-weight: 500;
            border: 1px dashed #94a3b8;
        }
        .file-label:hover { background: #e6edf5; }
        #previewImg {
            margin-top: 12px;
            max-width: 90px;
            max-height: 90px;
            border-radius: 16px;
            display: none;
        }
        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #f8fafc;
            padding: 10px 16px;
            border-radius: 48px;
        }
        .btn-publish {
            background: linear-gradient(95deg, #3b82f6, #6366f1);
            border: none;
            padding: 12px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }
        .btn-publish:hover { transform: scale(1.01); box-shadow: 0 8px 20px rgba(59,130,246,0.4); }
        hr.thick {
            margin: 25px 0;
            border: 0;
            height: 4px;
            background: linear-gradient(90deg, #cbd5e1, #3b82f6, #cbd5e1);
            border-radius: 4px;
        }
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 24px;
        }
        .post-item {
            background: white;
            border-radius: 28px;
            overflow: hidden;
            transition: 0.2s;
            cursor: pointer;
            box-shadow: 0 5px 12px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }
        .post-item:hover { transform: translateY(-5px); box-shadow: 0 20px 28px -12px rgba(0,0,0,0.2); }
        .post-img {
            height: 150px;
            background: #eef2ff;
            overflow: hidden;
        }
        .post-img img { width: 100%; height: 100%; object-fit: cover; }
        .post-info { padding: 16px; flex: 1; }
        .post-summary {
            font-weight: 500;
            margin-bottom: 10px;
            line-height: 1.45;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .post-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.7rem;
            margin-top: 8px;
        }
        .type-badge {
            background: #e2e8f0;
            padding: 3px 10px;
            border-radius: 30px;
        }
        .type-badge.permanent { background: #bbf7d0; color: #166534; }
        .type-badge.temp { background: #fed7aa; color: #9a3412; }
        .copy-link {
            background: none;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            opacity: 0.7;
        }
        .copy-link:hover { opacity: 1; }
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-card {
            background: white;
            max-width: 600px;
            width: 100%;
            border-radius: 48px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 24px;
            position: relative;
        }
        .modal-card img { width: 100%; max-height: 380px; object-fit: contain; border-radius: 24px; margin: 12px 0; }
        .close-modal {
            position: absolute;
            top: 16px;
            left: 16px;
            background: #eef2ff;
            border: none;
            border-radius: 30px;
            padding: 6px 14px;
            cursor: pointer;
        }
        @media (max-width: 640px) { body { padding: 14px; } .posts-grid { grid-template-columns: 1fr; } }
        .loader { text-align: center; padding: 40px; color: #475569; }
        .token-panel {
            background: #fff7ed;
            border: 2px solid #f97316;
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: center;
        }
        .token-panel input {
            width: 70%;
            padding: 8px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 20px;
            direction: ltr;
        }
        .token-panel button {
            background: #f97316;
            color: white;
            border: none;
            padding: 6px 15px;
            border-radius: 30px;
            cursor: pointer;
        }
        .note {
            font-size: 0.75rem;
            color: #9a3412;
            margin-top: 8px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="top-bar">
        <div class="logo"><h1>✨ پست‌بوم</h1></div>
        <div class="credit">Coded By Erfan <i>❤️</i></div>
    </div>

    <div id="tokenPanel" class="token-panel">
        <b>🔐 تنظیمات اولیه (فقط یک بار)</b><br>
        <small>برای نوشتن پست، توکن گیت‌هاب خود را وارد کن</small>
        <input type="password" id="githubTokenInput" placeholder="توکن ghp_xxxx...">
        <button onclick="saveToken()">ذخیره توکن</button>
        <div class="note">⚠️ توکن فقط در مرورگر خودت ذخیره می‌شود. بقیه کاربران فقط می‌توانند پست‌ها را ببینند.</div>
    </div>

    <div id="mainContent" style="display:none;">
        <div class="create-card">
            <div class="form-group">
                <label>📝 متن پست</label>
                <textarea id="postText" rows="3" placeholder="چی بنویسم؟"></textarea>
            </div>
            <div class="form-group">
                <label>🖼️ عکس (اختیاری)</label>
                <input type="file" id="imageFile" accept="image/jpeg,image/png,image/webp" style="display:none">
                <div class="file-label" onclick="document.getElementById('imageFile').click()">📁 انتخاب عکس</div>
                <div><img id="previewImg"></div>
            </div>
            <div class="form-group">
                <div class="checkbox-row">
                    <input type="checkbox" id="tempCheck">
                    <label style="margin:0">⏳ موقتی (بعد ۲۴ ساعت پاک می‌شود)</label>
                </div>
            </div>
            <button class="btn-publish" id="publishButton">➕ انتشار پست</button>
        </div>
        <hr class="thick">
        <div id="postsList" class="posts-grid"><div class="loader">در حال بارگذاری...</div></div>
    </div>
</div>

<script>
    // ========== تنظیمات گیت‌هاب (این دو خط رو حتما عوض کن) ==========
    const GITHUB_OWNER = "YOUR_GITHUB_USERNAME";   // یوزرنیم گیت‌هات
    const GITHUB_REPO = "YOUR_REPO_NAME";          // اسم مخزن
    const POSTS_FILE = "posts.json";
    // =============================================================

    let githubToken = localStorage.getItem('gh_token');

    if(githubToken) {
        document.getElementById('tokenPanel').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
        loadPosts();
    }

    window.saveToken = function() {
        let token = document.getElementById('githubTokenInput').value.trim();
        if(token) {
            localStorage.setItem('gh_token', token);
            githubToken = token;
            document.getElementById('tokenPanel').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            loadPosts();
        } else {
            alert('توکن رو وارد کن');
        }
    };

    // تبدیل عکس به Base64
    function compressImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = e => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height;
                    const max = 800;
                    if (w > h && w > max) { h = (h * max) / w; w = max; }
                    else if (h > max) { w = (w * max) / h; h = max; }
                    canvas.width = w;
                    canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    resolve(canvas.toDataURL('image/jpeg', 0.7));
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });
    }

    // پیش‌نمایش عکس
    document.getElementById('imageFile').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = ev => {
                const preview = document.getElementById('previewImg');
                preview.src = ev.target.result;
                preview.style.display = 'block';
                preview.style.width = '80px';
                preview.style.height = '80px';
                preview.style.borderRadius = '16px';
                preview.style.objectFit = 'cover';
            };
            reader.readAsDataURL(file);
        }
    });

    // خواندن پست‌ها از فایل خام گیت‌هاب (بدون نیاز به توکن)
    async function fetchPosts() {
        const url = `https://raw.githubusercontent.com/${GITHUB_OWNER}/${GITHUB_REPO}/main/${POSTS_FILE}`;
        try {
            const res = await fetch(url);
            if (res.status === 404) return [];
            if (!res.ok) throw new Error('خطا در خواندن پست‌ها');
            const data = await res.json();
            return data;
        } catch(e) {
            console.error(e);
            return [];
        }
    }

    // ذخیره پست‌ها در گیت‌هاب (نیاز به توکن)
    async function savePosts(posts, existingSha) {
        const content = btoa(unescape(encodeURIComponent(JSON.stringify(posts, null, 2))));
        const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${POSTS_FILE}`;
        const body = {
            message: "Update posts via website",
            content: content,
            branch: "main"
        };
        if (existingSha) body.sha = existingSha;
        const res = await fetch(url, {
            method: 'PUT',
            headers: {
                'Authorization': `token ${githubToken}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(body)
        });
        if (!res.ok) throw new Error('خطا در ذخیره پست‌ها');
        return await res.json();
    }

    // بارگذاری و نمایش پست‌ها
    async function loadPosts() {
        const container = document.getElementById('postsList');
        container.innerHTML = '<div class="loader">بارگذاری...</div>';
        let posts = await fetchPosts();
        const now = Date.now();
        // حذف پست‌های موقتی منقضی شده
        let changed = false;
        const validPosts = posts.filter(p => {
            if (p.permanent) return true;
            if (p.expiry > now) return true;
            changed = true;
            return false;
        });
        if (changed) {
            // اگر پستی حذف شد، فایل رو به‌روز کن
            try {
                const fileInfo = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${POSTS_FILE}`, {
                    headers: { 'Authorization': `token ${githubToken}` }
                });
                const data = await fileInfo.json();
                await savePosts(validPosts, data.sha);
                posts = validPosts;
            } catch(e) { console.warn('نتوانست پست‌های منقضی را پاک کند'); }
        }
        if (!posts.length) {
            container.innerHTML = '<div style="text-align:center; padding:40px;">هیچ پستی نیست. اولین پست رو تو بساز!</div>';
            return;
        }
        posts.sort((a,b) => b.createdAt - a.createdAt);
        renderPosts(posts);
    }

    function renderPosts(posts) {
        const container = document.getElementById('postsList');
        container.innerHTML = '';
        posts.forEach(post => {
            const card = document.createElement('div');
            card.className = 'post-item';
            card.onclick = (e) => { if(!e.target.classList.contains('copy-link')) showModal(post); };
            const imgDiv = document.createElement('div');
            imgDiv.className = 'post-img';
            if(post.image) {
                const img = document.createElement('img');
                img.src = post.image;
                imgDiv.appendChild(img);
            } else {
                imgDiv.style.background = '#cbd5e1';
                imgDiv.innerHTML = '<div style="height:100%; display:flex; align-items:center; justify-content:center;">📸 بدون عکس</div>';
            }
            const infoDiv = document.createElement('div');
            infoDiv.className = 'post-info';
            const summaryDiv = document.createElement('div');
            summaryDiv.className = 'post-summary';
            summaryDiv.innerText = post.text.length > 100 ? post.text.slice(0,100)+'...' : post.text;
            const footerDiv = document.createElement('div');
            footerDiv.className = 'post-footer';
            const badge = document.createElement('span');
            badge.className = `type-badge ${post.permanent ? 'permanent' : 'temp'}`;
            badge.innerText = post.permanent ? '♾️ دائمی' : '⏳ موقتی';
            const copyBtn = document.createElement('button');
            copyBtn.className = 'copy-link';
            copyBtn.innerHTML = '📋 کپی';
            copyBtn.onclick = (e) => {
                e.stopPropagation();
                navigator.clipboard.writeText(`${window.location.origin}?post=${post.id}`);
                alert('لینک کپی شد');
            };
            footerDiv.appendChild(badge);
            footerDiv.appendChild(copyBtn);
            infoDiv.appendChild(summaryDiv);
            infoDiv.appendChild(footerDiv);
            card.appendChild(imgDiv);
            card.appendChild(infoDiv);
            container.appendChild(card);
        });
    }

    // انتشار پست جدید
    document.getElementById('publishButton').onclick = async () => {
        if (!githubToken) {
            alert('برای نوشتن پست باید توکن گیت‌هاب را وارد کنی');
            return;
        }
        const text = document.getElementById('postText').value.trim();
        if (!text) return alert('لطفا متن رو بنویس');
        const file = document.getElementById('imageFile').files[0];
        let imageBase64 = null;
        if (file) imageBase64 = await compressImage(file);
        const isTemp = document.getElementById('tempCheck').checked;
        const now = Date.now();
        const newPost = {
            id: Date.now() + '-' + Math.random().toString(36).substring(2, 8),
            text: text,
            image: imageBase64,
            permanent: !isTemp,
            createdAt: now,
            expiry: isTemp ? now + 24*60*60*1000 : null
        };
        try {
            // دریافت پست‌های فعلی
            let currentPosts = await fetchPosts();
            currentPosts.unshift(newPost);
            // دریافت sha فایل فعلی برای به‌روزرسانی
            const fileInfo = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${POSTS_FILE}`, {
                headers: { 'Authorization': `token ${githubToken}` }
            });
            const data = await fileInfo.json();
            await savePosts(currentPosts, data.sha);
            // ریست فرم
            document.getElementById('postText').value = '';
            document.getElementById('imageFile').value = '';
            document.getElementById('previewImg').style.display = 'none';
            document.getElementById('tempCheck').checked = false;
            loadPosts();
        } catch(err) {
            alert('خطا در انتشار: ' + err.message);
        }
    };

    function showModal(post) {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-card">
                <button class="close-modal">✖ بستن</button>
                ${post.image ? `<img src="${post.image}" alt="post image">` : '<div style="background:#f1f5f9; border-radius:32px; padding:20px; text-align:center;">بدون تصویر</div>'}
                <p style="font-size:1.2rem; margin: 16px 0; line-height:1.5;">${post.text}</p>
                <div style="display: flex; justify-content: space-between; align-items:center;">
                    <span class="type-badge ${post.permanent ? 'permanent' : 'temp'}">${post.permanent ? 'دائمی' : 'موقتی'}</span>
                    <button id="modalCopyBtn" style="background:#eef2ff; border:none; border-radius:30px; padding:6px 16px;">📋 کپی لینک</button>
                </div>
                <small style="display:block; margin-top:16px; color:#64748b;">${new Date(post.createdAt).toLocaleString('fa-IR')}</small>
            </div>
        `;
        document.body.appendChild(modal);
        modal.querySelector('.close-modal').onclick = () => modal.remove();
        modal.querySelector('#modalCopyBtn').onclick = () => {
            navigator.clipboard.writeText(`${window.location.origin}?post=${post.id}`);
            alert('لینک کپی شد');
        };
    }

    // مدیریت لینک مستقیم پست
    window.addEventListener('load', () => {
        const params = new URLSearchParams(window.location.search);
        const postId = params.get('post');
        if(postId) {
            fetchPosts().then(posts => {
                const post = posts.find(p => p.id === postId);
                if(post) showModal(post);
            });
            history.replaceState({}, '', window.location.pathname);
        }
    });
</script>
</body>
</html>
