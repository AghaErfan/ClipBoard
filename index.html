<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Link Posts</title>

<style>
@font-face {
    font-family: "BYekan";
    src: url("https://cdn.jsdelivr.net/gh/rastikerdar/byekan-font@v1.0.0/BYekan.woff");
}

body{
    margin:0;
    font-family: BYekan, sans-serif;
    background:#0f0f13;
    color:#fff;
}

.container{
    max-width:700px;
    margin:auto;
    padding:20px;
}

.header{
    text-align:center;
    font-size:22px;
    margin-bottom:20px;
}

.card{
    background:#1c1c24;
    padding:15px;
    border-radius:12px;
    margin-bottom:10px;
}

input, textarea{
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:8px;
    border:none;
    outline:none;
}

button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#6c5ce7;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#5a4bd6;
}

.post-img{
    width:100%;
    border-radius:10px;
    margin-top:10px;
}

.link-box{
    background:#111;
    padding:10px;
    border-radius:8px;
    word-break:break-all;
    margin-top:10px;
}

a{ color:#00d2ff; }
</style>
</head>

<body>

<div class="container">

<div class="header">❤️ Coded By Erfan</div>

<div id="app"></div>

</div>

<script>
// Encode / Decode
function encode(data){
    return btoa(unescape(encodeURIComponent(JSON.stringify(data))));
}

function decode(data){
    return JSON.parse(decodeURIComponent(escape(atob(data))));
}

const app = document.getElementById("app");

// اگر لینک پست باشد
if(location.hash.length > 1){

    let post = decode(location.hash.slice(1));

    app.innerHTML = `
        <div class="card">
            <h2>${post.title}</h2>
            <p>${post.desc}</p>

            ${post.img ? `<img class="post-img" src="${post.img}">` : ""}

            ${post.url ? `<p><a href="${post.url}" target="_blank">${post.url}</a></p>` : ""}
        </div>

        <button onclick="location.href='/'">⬅ برگشت</button>
    `;

}else{

// فرم ساخت پست
app.innerHTML = `
<div class="card">

<input id="title" placeholder="عنوان">
<textarea id="desc" placeholder="توضیحات"></textarea>
<input id="url" placeholder="لینک (اختیاری)">

<input type="file" id="img">

<button onclick="publish()">Publish</button>

<div id="result"></div>

</div>
`;
}

function publish(){

    const title = document.getElementById("title").value;
    const desc = document.getElementById("desc").value;
    const url = document.getElementById("url").value;
    const imgFile = document.getElementById("img").files[0];

    if(!title) return alert("عنوان خالیه");

    function finish(imgBase64){

        const data = {
            title,
            desc,
            url,
            img: imgBase64
        };

        const hash = encode(data);

        const link = location.origin + location.pathname + "#" + hash;

        document.getElementById("result").innerHTML = `
            <div class="link-box">
                لینک پست:<br>
                <a href="${link}" target="_blank">${link}</a>
            </div>

            <button onclick="navigator.clipboard.writeText('${link}')">
                کپی لینک
            </button>
        `;
    }

    if(imgFile){
        const reader = new FileReader();
        reader.onload = e => finish(e.target.result);
        reader.readAsDataURL(imgFile);
    }else{
        finish("");
    }
}
</script>

</body>
</html>
