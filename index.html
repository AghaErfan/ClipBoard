<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Post</title>
<style>
body{
    font-family:sans-serif;
    background:#0f1115;
    color:white;
    padding:20px;
}
</style>
</head>

<body>

<div id="post"></div>

<script>

const OWNER = "YOUR_USERNAME";
const REPO = "YOUR_REPO";

function getFile(){
    return new URLSearchParams(location.search).get("file");
}

async function load(){

    let file = getFile();

    let res = await fetch(`https://raw.githubusercontent.com/${OWNER}/${REPO}/main/${file}`);
    let data = await res.json();

    document.getElementById("post").innerHTML = `
        <h1>${data.title}</h1>
        <p>${data.content}</p>
        <small>${data.date}</small>
    `;
}

load();

</script>

</body>
</html>
